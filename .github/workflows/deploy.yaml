on:
  push:
    branches:
      - main

jobs:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Install dependencies
      run: npm install -g pnpm@latest && pnpm install
    - name: Run tests
      run: pnpm lint
